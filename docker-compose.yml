version: '3.8'

services:
  backend:
    build: ./backend
    container_name: django_backend
    volumes:
      - ./backend:/app  # Чтобы изменения в коде сразу применялись без перезапуска
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate && 
             python manage.py runserver 0.0.0.0:8000"